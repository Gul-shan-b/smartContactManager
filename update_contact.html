<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Contact - Smart Contact Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Update Contact</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="view_contacts.html">View Contacts</a>
            </nav>
        </header>

        <main>
            <form id="updateContactForm" style="display: none;">
                <!-- Hidden inputs to store _id and _rev crucial for CouchDB updates -->
                <input type="hidden" id="update_id" name="_id">
                <input type="hidden" id="update_rev" name="_rev">
                <input type="hidden" id="update_favourite" name="favourite">

                <div class="form-group">
                    <label for="update_name">Name:</label>
                    <input type="text" id="update_name" name="name">    
                </div>

                <div class="form-group">
                    <label for="update_email">Email:</label>
                    <input type="email" id="update_email" name="email">
                </div>

                <div class="form-group">
                    <label for="update_phone">Phone:</label>
                    <input type="tel" id="update_phone" name="phone">   
                </div>

                <div class="form-group">
                    <label for="update_city">City:</label>
                    <input type="text" id="update_city" name="city">
                </div>

                <div class="form-group">
                    <label for="update_category">Category:</label>
                    <select id="update_category" name="category" required>
                        <option value="Friends">Friends</option>
                        <option value="Family">Family</option>
                        <option value="Work">Work</option>
                        <option value="Clients">Clients</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="update_photoFile">Photo Upload (Leave empty to keep current):</label>
                    <input type="file" id="update_photoFile" name="photoFile" accept="image/*">
                </div>
                
                <input type="hidden" id="update_photoUrl" name="photoUrl">

                <div class="form-group">
                    <label for="update_notes">Notes/Description:</label>
                    <textarea id="update_notes" name="notes" rows="4"></textarea>
                </div>

                <button type="submit" class="btn">Update Contact</button>
            </form>
            
            <div id="loadingMessage" class="message success">Loading contact details...</div>
            <div id="updateMessage" class="message"></div>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        // Check for docId in query params and load data if present
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const docId = urlParams.get('docId');
            
            if (docId) {
                loadContactForUpdate(docId);
            } else {
                document.getElementById('loadingMessage').innerHTML = 'Error: No Contact ID provided. <a href="view_contacts.html">Go back to View Contacts</a>';
                document.getElementById('loadingMessage').className = 'message error';
            }
        });
    </script>
</body>
</html>
